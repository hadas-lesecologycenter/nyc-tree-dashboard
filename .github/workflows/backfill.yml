name: Backfill Historical Tree Activities

# Run this ONCE manually to pull the full activity history from NYC Tree Map.
# After the initial backfill the daily scrape.yml takes over for new activities.
on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run backfill
        run: python backfill.py

      - name: Commit and push full history
        run: |
          git config user.name "Tree Scraper Bot"
          git config user.email "bot@lesecologycenter.org"
          git add data/activities.csv
          git diff --staged --quiet || (git commit -m "Backfill all historical activities $(date +'%Y-%m-%d')" && git pull --rebase && git push)

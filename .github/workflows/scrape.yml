name: Daily Tree Activity Scraper

on:
  schedule:
    - cron: '0 9 * * *'  # Runs every day at 9am UTC (5am EST)
  workflow_dispatch:       # Also allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push new data
        run: |
          git config user.name "Tree Scraper Bot"
          git config user.email "bot@lesecologycenter.org"
          git add data/activities.csv
          git diff --staged --quiet || git commit -m "Daily scrape $(date +'%Y-%m-%d')"
          git push
